test_cases:

  - name: "Pick Apple"
    prompt: "pick up apple"
    expected:
      recipe_name: "Pick Apple"
      first_action: "home"
      last_action: "home"
      must_contain_actions: ["gripper", "move_arm"]
      must_contain_targets: ["apple"]

  - name: "Place Banana"
    prompt: "pick banana and place it back"
    expected:
      recipe_name: "Place Banana"
      first_action: "home"
      last_action: "home"
      must_contain_actions: ["move_arm", "gripper"]
      must_contain_targets: ["banana"]

  - name: "Invalid Object"
    prompt: "pick car"
    expected:
      must_contain_actions: []
      must_contain_targets: []

  - name: "Pick Apple and Place on Tray"
    prompt: "pick up the apple and place it on the tray"
    expected:
      recipe_name: "Pick and Place Apple on Tray"
      first_action: "home"
      last_action: "home"
      must_contain_actions: ["gripper", "move_arm", "relative_move"]
      must_contain_targets: ["apple", "tray"]

  - name: "Pick Banana and Return Home"
    prompt: "pick up the banana"
    expected:
      recipe_name: "Pick Banana"
      first_action: "home"
      last_action: "home"
      must_contain_actions: ["gripper", "move_arm", "relative_move"]
      must_contain_targets: ["banana"]

  - name: "Relocate Apple to Inspection Zone"
    prompt: "move the apple to the inspection zone"
    expected:
      recipe_name: "Relocate Apple to Inspection Zone"
      first_action: "home"
      last_action: "home"
      must_contain_actions: ["gripper", "move_arm", "relative_move"]
      must_contain_targets: ["apple", "inspection_zone"]